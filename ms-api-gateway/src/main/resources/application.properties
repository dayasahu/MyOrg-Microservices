spring.application.name=ms-api-gateway
server.port=8888

# ----- Config Server retry -----
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.retry.initial-interval=3000
spring.cloud.config.retry.multiplier=1.5
spring.cloud.config.retry.max-interval=10000

# ----- Actuator + metrics -----
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,configprops,loggers,mappings
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# ----- Observability -----
management.tracing.sampling.probability=1.0

management.otlp.tracing.endpoint=${OTEL_TRACES_ENDPOINT:http://otel-collector:4318/v1/traces}
management.otlp.metrics.export.url=${OTEL_METRICS_ENDPOINT:http://otel-collector:4318/v1/metrics}
management.otlp.logging.endpoint=${OTEL_LOGS_ENDPOINT:http://otel-collector:4318/v1/logs}

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ----- Gateway routes -----
# Employee route
spring.cloud.gateway.server.webflux.routes[0].id=employee
spring.cloud.gateway.server.webflux.routes[0].uri=http://employee:80
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/employee/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1
# Department route
spring.cloud.gateway.server.webflux.routes[1].id=department
spring.cloud.gateway.server.webflux.routes[1].uri=http://department:80
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/department/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

# Auth route - no JWT filter applied (whitelisted in JwtAuthenticationFilter)
spring.cloud.gateway.server.webflux.routes[2].id=auth-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://auth-service:9000
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

# JWT secret - must match auth-service JWT_SECRET
jwt.secret=${JWT_SECRET:myDefaultSecretKey1234567890abcdefghij}
