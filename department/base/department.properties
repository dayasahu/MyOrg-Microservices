# Department runtime config - served by Spring Cloud Config Server (configserver)
# in the cluster, sourced from this file via Kustomize ConfigMap generator.

spring.application.name=department
server.port=8080
spring.cloud.config.fail-fast=true

# ----- Actuator + Prometheus -----
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,env,refresh,prometheus,metrics,loggers,mappings
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ----- Observability (OpenTelemetry) -----
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_TRACES_ENDPOINT:http://alloy.observability.svc.cluster.local:4318/v1/traces}
management.otlp.metrics.export.url=${OTEL_METRICS_ENDPOINT:http://alloy.observability.svc.cluster.local:4318/v1/metrics}


logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
