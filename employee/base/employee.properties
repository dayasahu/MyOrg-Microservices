# Employee runtime config - served by Spring Cloud Config Server (configserver)
# in the cluster, sourced from this file via Kustomize ConfigMap generator.
#
# Mirrors config/props/employee/employee.properties used by docker-compose locally.

spring.application.name=employee
server.port=8080
spring.cloud.config.fail-fast=true

# ----- Actuator + Prometheus -----
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,env,refresh,prometheus,metrics,loggers,mappings
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ----- Observability (OpenTelemetry) -----
# Default endpoints assume the observability stack is deployed in cluster as
# `otel-collector` Service in the `observability` namespace. Until that's deployed,
# Spring will log "failed to export" warnings but the app keeps running.
# Override per-environment via the deployment's env section.
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_TRACES_ENDPOINT:http://otel-collector.observability.svc.cluster.local:4318/v1/traces}
management.otlp.metrics.export.url=${OTEL_METRICS_ENDPOINT:http://otel-collector.observability.svc.cluster.local:4318/v1/metrics}
management.otlp.logging.endpoint=${OTEL_LOGS_ENDPOINT:http://otel-collector.observability.svc.cluster.local:4318/v1/logs}

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
