apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
type: Opaque
stringData:
  # WARNING: This is a dev secret only - regenerate with `openssl rand -base64 48`
  # before deploying anywhere outside a local cluster.
  # Must match the value used by auth-service and ms-api-gateway in docker-compose.
  JWT_SECRET: "myDefaultSecretKey1234567890abcdefghij"
