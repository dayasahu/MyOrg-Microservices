spring.application.name=configserver
server.port=8072
spring.application.instance_id=${spring.application.name}:${random.value}

# ----- Actuator -----
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,beans,conditions,mappings,env,loggers,threaddump,heapdump
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ----- Observability -----
management.tracing.sampling.probability=1.0

management.otlp.tracing.endpoint=${OTEL_TRACES_ENDPOINT:http://otel-collector:4318/v1/traces}
management.otlp.metrics.export.url=${OTEL_METRICS_ENDPOINT:http://otel-collector:4318/v1/metrics}
management.otlp.logging.endpoint=${OTEL_LOGS_ENDPOINT:http://otel-collector:4318/v1/logs}

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ----- Config server (native profile, file-based properties) -----
spring.profiles.active=native

# Local dev path (Windows). Inside docker-compose this is replaced by the
# /config mount via the SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS env var.
spring.cloud.config.server.native.search-locations=file:/D://1_GITHUB//microservices-training//config//props//employee,file:/D://1_GITHUB//microservices-training//config//props//department

# Kubernetes config map mount path (uncomment in cluster):
#spring.cloud.config.server.native.search-locations=file:/config/employee,file:/config/department
