# API gateway runtime config - served by Spring Cloud Config Server (configserver)
# in the cluster, sourced from this file via Kustomize ConfigMap generator.
#
# IMPORTANT: configserver looks up properties under the app name passed via
# SPRING_APPLICATION_NAME on the gateway deployment. Make sure the file basename
# (apigateway.properties) matches that env var.

spring.application.name=apigateway
server.port=8888

# ----- Actuator + Prometheus -----
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,configprops,loggers,mappings
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# ----- Observability (OpenTelemetry) -----
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_TRACES_ENDPOINT:http://otel-collector.observability.svc.cluster.local:4318/v1/traces}
management.otlp.metrics.export.url=${OTEL_METRICS_ENDPOINT:http://otel-collector.observability.svc.cluster.local:4318/v1/metrics}
management.otlp.logging.endpoint=${OTEL_LOGS_ENDPOINT:http://otel-collector.observability.svc.cluster.local:4318/v1/logs}

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ----- Gateway routes -----
# Each route forwards to the cluster-internal Service of the target microservice.
spring.cloud.gateway.server.webflux.routes[0].id=employee-route
spring.cloud.gateway.server.webflux.routes[0].uri=http://employee:80
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/employee/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[1].id=department-route
spring.cloud.gateway.server.webflux.routes[1].uri=http://department:80
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/department/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[2].id=authservice-route
spring.cloud.gateway.server.webflux.routes[2].uri=http://auth-service:9000
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

# JWT secret - injected via env var sourced from the jwt-secret Secret.
jwt.secret=${JWT_SECRET:}
