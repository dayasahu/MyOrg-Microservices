apiVersion: apps/v1
kind: Deployment
metadata:
  name: department
  labels:
    app: department
spec:
  replicas: 1
  selector:
    matchLabels:
      app: department
  template:
    metadata:
      labels:
        app: department
      annotations:
        # Pick up by the in-cluster Prometheus if one is deployed.
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: department
          image: dayasahu6077/department:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # Pull all runtime config from the configserver in the same namespace.
            # `optional:` means the pod will still start if configserver is briefly
            # unreachable - falls back to the jar's bootstrap application.properties.
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://configserver:8071"
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: SPRING_APPLICATION_NAME
              value: "department"
            - name: OTEL_TRACES_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
            - name: OTEL_METRICS_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318/v1/metrics
            - name: OTEL_LOGS_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318/v1/logs
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
