apiVersion: v1
kind: Service
metadata:
  name: configserver
  labels:
    app: configserver
spec:
  selector:
    app: configserver
  # ClusterIP - only reachable from inside the cluster, which is what we want.
  # The previous LoadBalancer type would expose configserver publicly, which is
  # a security risk because it serves all microservice config.
  type: ClusterIP
  ports:
    - name: http
      port: 8071
      targetPort: 8071
      protocol: TCP
