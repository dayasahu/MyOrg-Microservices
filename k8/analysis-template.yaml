apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: smoke-test
spec:
  args:
    - name: preview-url
  metrics:
    - name: health-check
      count: 3
      interval: 10s
      failureLimit: 1
      successCondition: result == "UP"
      provider:
        web:
          url: "{{args.preview-url}}/actuator/health/readiness"
          jsonPath: "{$.status}"
